name: CI

on:
  pull_request: {}
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B spotless:check

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B test

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run container smoke harness
        run: ./smoke-container.sh
      - name: Save Docker image as artifact
        run: docker save squash-app:smoke | gzip > image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: image.tar.gz
          retention-days: 1

  e2e:
    needs: container-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: app-image
      - name: Load Docker image
        run: docker load -i image.tar.gz
      - name: Start Postgres and app
        run: ./start-e2e-app.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install npm deps
        run: npm ci
        working-directory: frontend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Run E2E tests
        run: npm run e2e
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8080
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  ci-success:
    needs: [backend-lint, backend-test, frontend-lint, frontend-test, container-smoke, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all gates passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more gate jobs failed."
            exit 1
          fi
