spring.application.name=squash-progress-tracker

server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

llm.api-key=${LLM_API_KEY:}
llm.base-url=${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
llm.model=${LLM_MODEL:gemini-2.5-flash}
llm.structured-model=${LLM_STRUCTURED_MODEL:}
llm.timeout=${LLM_TIMEOUT:30s}
